name: Message Broker CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  packageAndTest:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build and analyze (sonar cloud)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=ahmedgarci \
            -Dsonar.projectKey=ahmedgarci_messageBroker


  deploy:
    needs: packageAndTest
    runs-on: ubuntu-latest

    steps:
      - name: checkoutCode
        uses: actions/checkout@v4

      - name: Setup DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASS }}

      - name: Build Image
        run: docker build -t ${{ secrets.USERNAME }}/message-broker:1.${{ github.run_number }} .

      - name: Push Image
        run: docker push ${{ secrets.USERNAME }}/message-broker:1.${{ github.run_number }}