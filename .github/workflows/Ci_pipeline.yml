name: Message Broker CI Pipeline

on:
    push: 
        branches: ["main"]

jobs:
    packageApp:
        runs-on: ubuntu-latest
        steps:
            - name: checkout-code
              uses: actions/checkout@v4
                
            - name: SetupDockerHub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.USERNAME }}
                password: ${{ secrets.PASS }}
            
            - name: BuildImage
              run: docker build -t ${{ secrets.USERNAME }}/message-broker:1.${{ github.run_number }} .
            
            - name: DeployToDockerHub
              run: docker push ${{ secrets.USERNAME }}/message-broker:1.${{ github.run_number }}
